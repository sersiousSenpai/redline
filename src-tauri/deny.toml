# cargo-deny configuration — license compliance gate.
# Run: cargo deny --manifest-path src-tauri/Cargo.toml check licenses
#
# Purpose: ensure no copyleft (GPL/AGPL/LGPL) or unknown-license crate enters
# the dependency graph, keeping Redline's permissive Apache-2.0 distribution
# and acquisition story clean.

[licenses]
# Only permissive licenses are allowed.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MITNFA",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"

[advisories]
# License audit only here; this file does not gate on vulnerabilities.
yanked = "warn"
