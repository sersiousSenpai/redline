name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where you wanted this — what were you trying to do?
      placeholder: When reviewing a long plan, I want to…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Your idea for how Redline could handle it. Rough is fine.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds or alternatives
      description: How do you deal with this today, if at all?
    validations:
      required: false
