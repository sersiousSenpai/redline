name: Bug report
description: Something in Redline isn't working right
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: I submitted a Revise round and the plan came back with…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: If you can make it happen again, list the steps.
      placeholder: |
        1. Open a plan in Redline
        2. …
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Redline version
      description: Shown in the tray menu, or the git commit if you built from source.
      placeholder: 0.1.0 / commit 137f42e
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: macOS version and chip
      placeholder: macOS 15.5 (Apple Silicon)
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`, if the bug involves the hook/review flow.
      placeholder: 2.1.x
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: If you launched from a terminal, paste relevant output here. (A "Open Logs Folder" menu item is coming; until then, terminal output is the best source.)
      render: text
    validations:
      required: false
