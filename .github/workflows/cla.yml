name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Required so the action can post PR comments, set the commit status,
# and write the signature file back to this repository.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only needed if signatures are ever stored in a REMOTE repository.
          # We store them in this repo (branch below), so the default
          # GITHUB_TOKEN with the contents:write permission above is enough
          # and this secret may stay unset.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Signatures are stored in THIS repository (no third-party
          # service) on a dedicated branch.
          path-to-signatures: '.github/cla-signatures/v1.json'
          path-to-document: 'https://github.com/sersiousSenpai/redline/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],github-actions[bot]'
          custom-notsigned-prcomment: 'Thank you for your contribution. Before this pull request can be merged, please read our [Contributor License Agreement](https://github.com/sersiousSenpai/redline/blob/main/CLA.md) (a copyright-assignment CLA) and then add a comment below containing exactly:'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
